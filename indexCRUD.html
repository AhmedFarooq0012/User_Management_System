<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Management</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-4 md:p-10">

<div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">

<h1 class="text-2xl md:text-3xl font-bold mb-6 text-center">
User Management System
</h1>

<div id="messageBox" class="hidden p-3 mb-4 rounded text-center"></div>

<!-- USER TABLE -->
<div class="overflow-x-auto">

<table class="min-w-full border">

<thead class="bg-gray-200">

<tr>
<th class="p-3 border">ID</th>
<th class="p-3 border">First Name</th>
<th class="p-3 border">Last Name</th>
<th class="p-3 border">Email</th>
<th class="p-3 border">Phone</th>
<th class="p-3 border">Actions</th>
</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<!-- EDIT USER MODAL -->
<div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center">

<div class="bg-white p-6 rounded w-96">

<h2 class="text-xl font-bold mb-4">Edit User</h2>

<form id="editForm" class="space-y-3">

<input type="hidden" id="editId">

<input type="text" id="editFirstName" class="border p-2 w-full rounded" placeholder="First Name">

<input type="text" id="editLastName" class="border p-2 w-full rounded" placeholder="Last Name">

<input type="email" id="editEmail" class="border p-2 w-full rounded" placeholder="Email">

<input type="text" id="editPhone" class="border p-2 w-full rounded" placeholder="Phone">

<div class="flex justify-end gap-2 mt-4">

<button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-400 text-white rounded">
Cancel  
</button>

<button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded">
Update
</button>

</div>

</form>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
