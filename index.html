<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-7xl mx-auto bg-white p-4 md:p-6 rounded shadow">

        <h1 class="text-2xl md:text-3xl font-bold mb-6 text-center">
            User Management System
        </h1>
        <div id="successMsg" class="hidden bg-green-100 text-green-700 p-3 rounded mb-4 text-center"></div>

        <!-- User Form -->
        <form id="userForm" ]>

            <input type="text" id="firstName" placeholder="First Name">

            <input type="text" id="lastName" placeholder="Last Name">

            <input type="email" id="email" placeholder="Email">

            <input type="text" id="phone" placeholder="Phone">

            <button  class="bg-blue-500 text-white py-2 px-4 rounded md:col-span-2 hover:bg-blue-600">
                Add User
            </button>
        </form>
        <br><br>

        <!-- Responsive Table Wrapper -->
        <div class="overflow-x-auto">

            <table class="min-w-full border border-gray-300 text-sm md:text-base">

                <thead class="bg-gray-200">

                    <tr>

                        <th class="p-3 border">ID</th>
                        <th class="p-3 border">First Name</th>
                        <th class="p-3 border">Last Name</th>
                        <th class="p-3 border">Email</th>
                        <th class="p-3 border">Phone</th>
                        <th class="p-3 border">Actions</th>

                    </tr>

                </thead>

                <tbody id="userTable" class="text-center">

                </tbody>

            </table>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
